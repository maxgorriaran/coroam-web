<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Brand Icon (v6) -->
    <link rel="icon" type="image/png" href="/coroam-branding-v6.png" />
    <link rel="apple-touch-icon" href="/coroam-branding-v6.png" />
    <link rel="shortcut icon" href="/coroam-branding-v6.png" />
    <link rel="image_src" href="/coroam-branding-v6.png" />
    <link rel="manifest" href="/site.webmanifest?v=6" />

    <meta
      name="description"
      content="The premier AI walking companion for urban explorers. Unlock hidden city lore, vibe-based routes, and atmospheric solo walks with CoRoam. Join the waitlist for early access."
    />
    
    <!-- Social Metadata (Force High-Res) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CoRoam — Atmospheric Urban Walking & AI Guided Routes" />
    <meta property="og:description" content="Stop navigating. Start roaming. Swap the shortest route for the most interesting one." />
    <meta property="og:url" content="https://coroam.io/" />
    <meta property="og:image" content="/coroam-branding-v6.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="1200" />
    
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CoRoam — Atmospheric Urban Walking & AI Guided Routes" />
    <meta name="twitter:description" content="Stop navigating. Start roaming. The premier AI companion for the city's hidden gems." />
    <meta name="twitter:image" content="/coroam-branding-v6.png" />

    <title>CoRoam — Atmospheric Urban Walking & AI Guided Routes</title>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "CoRoam",
        "operatingSystem": "iOS, Android",
        "applicationCategory": "TravelApplication",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "description": "A companion for urban explorers. Experience atmospheric walking routes and AI-guided city roams.",
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": "5",
          "ratingCount": "1"
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "CoRoam",
        "url": "https://coroam.io",
        "logo": "https://coroam.io/coroam-branding-v6.png",
        "sameAs": [
          "https://x.com/coroamapp",
          "https://instagram.com/coroam.io",
          "https://tiktok.com/@coroam.io",
          "https://facebook.com/coroam.io"
        ]
      }
    </script>
  </head>
  <body style="margin: 0; background: #0a1628">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
